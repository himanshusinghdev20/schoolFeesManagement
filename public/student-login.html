<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Login - School Fees Management System">
    <meta name="theme-color" content="#0d6efd">
    <title>Student Login - School Fees Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i {
            font-size: 4rem;
            color: #0d6efd;
            margin-bottom: 15px;
        }
        .login-header h2 {
            font-weight: 700;
            color: #2c3e50;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
        }
        .signup-link, .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .signup-link a, .back-link a {
            text-decoration: none;
            font-weight: 600;
            color: #0d6efd;
        }
        .alert {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-user-graduate"></i>
            <h2>Student Login</h2>
            <p>Access your fee dashboard</p>
        </div>

        <div id="alertMessage"></div>

        <form id="studentLoginForm">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="rollNumber" placeholder="Roll Number" required>
                <label><i class="fas fa-id-card"></i> Roll / Registration No</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
                <label><i class="fas fa-lock"></i> Password</label>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="signup-link">
            Don’t have an account? <a href="student-signup.html">Sign Up</a>
        </div>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('studentLoginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const loginId = document.getElementById('rollNumber').value.trim();
    const password = document.getElementById('password').value.trim();
    const rememberMe = document.getElementById('rememberMe').checked;
    const alertBox = document.getElementById('alertMessage');
    const btn = this.querySelector('button');

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

    try {
        const res = await fetch("http://localhost:3000/api/students/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ loginId, password })
        });

        const data = await res.json();

        if (data.success) {

            if (rememberMe) {
                localStorage.setItem("studentToken", data.token);
                localStorage.setItem("studentData", JSON.stringify(data.student));
            } else {
                sessionStorage.setItem("studentToken", data.token);
                sessionStorage.setItem("studentData", JSON.stringify(data.student));
            }

            alertBox.innerHTML =
                '<div class="alert alert-success">Login successful! Redirecting...</div>';

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);

        } else {
            throw new Error(data.message);
        }

    } catch (err) {
        alertBox.innerHTML =
            `<div class="alert alert-danger">${err.message}</div>`;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
});
</script>



</body>
</html>
