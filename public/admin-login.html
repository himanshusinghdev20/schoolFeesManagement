<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .login-card h2 {
            font-weight: 700;
            margin-bottom: 5px;
        }
        .login-card p {
            color: #6c757d;
        }
        .btn-login {
            font-weight: 600;
            padding: 12px;
            border-radius: 10px;
        }
        .back-link {
            margin-top: 15px;
            text-align: center;
        }
        .back-link a {
            text-decoration: none;
            color: #6c757d;
        }
        .back-link a:hover {
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <i class="fas fa-user-shield fa-3x text-primary mb-2"></i>
        <h2>Admin Login</h2>
        <p>Access the management dashboard</p>
    </div>

    <div id="alertMessage"></div>

    <form id="adminLoginForm">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="username" placeholder="Username" required>
            <label for="username"><i class="fas fa-user"></i> Username</label>
        </div>

        <div class="form-floating mb-3">
            <input type="password" class="form-control" id="password" placeholder="Password" required>
            <label for="password"><i class="fas fa-lock"></i> Password</label>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember me</label>
        </div>

        <button type="submit" class="btn btn-primary btn-login w-100">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </form>

    <div class="signup-link mt-3">
        <a href="#" onclick="showForgotPassword(); return false;">
            <i class="fas fa-key"></i> Forgot Password?
        </a>
    </div>

    <div class="back-link">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- LOGIN SCRIPT -->
<script>
document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const alertBox = document.getElementById('alertMessage');
    const btn = this.querySelector('button');

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

    try {
        const response = await fetch('http://localhost:3000/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, rememberMe: false })
        });

        const data = await response.json();

        if (data.success) {
            // Store admin data
            localStorage.setItem('adminToken', data.token);
            localStorage.setItem('adminData', JSON.stringify(data.admin));

            alertBox.innerHTML =
                '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Login successful! Redirecting...</div>';

            setTimeout(() => {
                window.location.href = "students.html"; // Admin goes to students page
            }, 1000);
        } else {
            throw new Error(data.error || 'Login failed');
        }
    } catch (error) {
        alertBox.innerHTML =
            `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ${error.message}</div>`;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
});

function showForgotPassword() {
    const alertBox = document.getElementById('alertMessage');
    alertBox.innerHTML = `
        <div class="alert alert-info">
            <strong><i class="fas fa-info-circle"></i> Forgot Password?</strong><br>
            Please contact the system administrator to reset your password.<br>
            <strong>Admin Contact:</strong> admin@school.com<br>
            <strong>Phone:</strong> +91-XXXXXXXXXX
        </div>
    `;
}
</script>

</body>
</html>
